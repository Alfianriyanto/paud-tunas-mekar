<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Hero Banner</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="../assets/css/style.css"
  >

</head>

<body>

<div id="sidebar-container"></div>

<div class="main-content">

  <div id="topbar-container"></div>

  <div class="content-wrapper">

    <div class="card p-4 mb-4">

      <h5 class="mb-4">
        Add Hero Banner
      </h5>

      <form id="heroBannerForm">

        <div class="mb-3">

          <label>Title</label>

          <input
            type="text"
            class="form-control"
            id="title"
          >

        </div>

        <div class="mb-3">

          <label>Subtitle</label>

          <textarea
            class="form-control"
            id="subtitle"
          ></textarea>

        </div>

        <div class="mb-3">

          <label>Image</label>

          <input
            type="file"
            class="form-control"
            id="image"
            required
          >

        </div>

        <button
          type="submit"
          class="btn btn-primary"
        >
          Save Banner
        </button>

      </form>

    </div>

    <div class="card p-4">

      <h5 class="mb-4">
        List Hero Banner
      </h5>

      <div class="table-responsive">

        <table class="table table-bordered">

          <thead>

            <tr>
              <th>Image</th>
              <th>Title</th>
              <th>Subtitle</th>
              <th>Action</th>
            </tr>

          </thead>

          <tbody id="heroBannerTable"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script src="../assets/js/api.js"></script>

<script src="../assets/js/auth.js"></script>

<script src="../assets/js/layout.js"></script>

<script src="../assets/js/hero-banner.js"></script>

<script>

  checkAuth();

  initLayout('Hero Banner');

</script>

</body>
</html>
