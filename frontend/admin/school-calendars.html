<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Kalender Sekolah</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="../assets/css/style.css"
  >

</head>

<body>

<div id="sidebar-container"></div>

<div class="main-content">

  <div id="topbar-container"></div>

  <div class="content-wrapper">

    <div class="card p-4 mb-4">

      <h5 class="mb-4">
        Add Kalender Sekolah
      </h5>

      <form id="calendarForm">

        <input
          type="hidden"
          id="calendarId"
        >

        <div class="mb-3">

          <label>Title</label>

          <input
            type="text"
            class="form-control"
            id="title"
            required
          >

        </div>

        <div class="mb-3">

          <label>Description</label>

          <textarea
            class="form-control"
            id="description"
            rows="4"
            required
          ></textarea>

        </div>

        <div class="mb-3">

  <label>Tanggal Mulai</label>

  <input
    type="date"
    class="form-control"
    id="start_date"
    required
  >

</div>

<div class="mb-3">

  <label>Tanggal Selesai</label>

  <input
    type="date"
    class="form-control"
    id="end_date"
  >

  <small class="text-muted">
    Kosongkan jika hanya 1 hari
  </small>

</div>

        <button
          type="submit"
          class="btn btn-primary"
        >
          Save Kalender
        </button>

      </form>

    </div>

    <div class="card p-4">

      <h5 class="mb-4">
        List Kalender Sekolah
      </h5>

      <div class="table-responsive">

        <table class="table table-bordered">

          <thead>

            <tr>
              <th>Tanggal Event</th>
              <th>Title</th>
              <th>Description</th>
              <th>Action</th>
            </tr>

          </thead>

          <tbody id="calendarTable"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script src="../assets/js/api.js"></script>

<script src="../assets/js/auth.js"></script>

<script src="../assets/js/layout.js"></script>

<script src="../assets/js/school-calendars.js"></script>

<script>

  checkAuth();

  initLayout('Kalender Sekolah');

</script>

</body>
</html>
