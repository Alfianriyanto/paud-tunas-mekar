<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Profile Sekolah</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="../assets/css/style.css"
  >

</head>

<body>

<div id="sidebar-container"></div>

<div class="main-content">

  <div id="topbar-container"></div>

  <div class="content-wrapper">

    <div class="card p-4">

      <h5 class="mb-4">
        Profile Sekolah
      </h5>

      <form id="schoolProfileForm">

        <div class="mb-3">

          <label>Nama Sekolah</label>

          <input
            type="text"
            class="form-control"
            id="school_name"
            required
          >

        </div>

        <div class="mb-3">

          <label>Nama Kepala Sekolah</label>

          <input
            type="text"
            class="form-control"
            id="principal_name"
            required
          >

        </div>

        <div class="mb-3">

          <label>Photo Kepala Sekolah</label>

          <input
            type="file"
            class="form-control"
            id="image"
          >

        </div>

        <div class="mb-3">

          <label>Sambutan Kepala Sekolah</label>

          <div
            id="editor"
            style="height:300px;"
          ></div>

        </div>

        <div class="mb-3">

          <label>Alamat</label>

          <textarea
            class="form-control"
            id="address"
            rows="3"
          ></textarea>

        </div>

        <div class="mb-3">

          <label>Jam Operasional</label>

          <input
            type="text"
            class="form-control"
            id="operational_hours"
          >

        </div>

        <div class="mb-3">

          <label>Whatsapp</label>

          <input
            type="text"
            class="form-control"
            id="whatsapp"
          >

        </div>

        <div class="mb-3">

          <label>Instagram</label>

          <input
            type="text"
            class="form-control"
            id="instagram"
          >

        </div>

        <div class="mb-4">

          <img
            id="previewImage"
            src=""
            width="200"
            style="display:none;border-radius:10px;"
          >

        </div>

        <button
          type="submit"
          class="btn btn-primary"
        >
          Save Profile
        </button>

      </form>

    </div>

  </div>

</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script src="../assets/js/api.js"></script>

<script src="../assets/js/auth.js"></script>

<script src="../assets/js/layout.js"></script>

<script src="../assets/js/school-profile.js"></script>

<script>

  checkAuth();

  initLayout('Profile Sekolah');

</script>

</body>
</html>
