<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Staff Pengajar</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="../assets/css/style.css"
  >

</head>

<body>

<div id="sidebar-container"></div>

<div class="main-content">

  <div id="topbar-container"></div>

  <div class="content-wrapper">

    <div class="card p-4 mb-4">

      <h5 class="mb-4">
        Add Staff Pengajar
      </h5>

      <form id="teacherForm">

        <input
          type="hidden"
          id="teacherId"
        >

        <div class="mb-3">

          <label>Nama</label>

          <input
            type="text"
            class="form-control"
            id="name"
            required
          >

        </div>

        <div class="mb-3">

          <label>Title</label>

          <input
            type="text"
            class="form-control"
            id="title"
            required
          >

        </div>

        <div class="mb-3">

          <label>Photo</label>

          <input
            type="file"
            class="form-control"
            id="photo"
          >

        </div>

        <button
          type="submit"
          class="btn btn-primary"
        >
          Save Staff
        </button>

      </form>

    </div>

    <div class="card p-4">

      <h5 class="mb-4">
        List Staff Pengajar
      </h5>

      <div class="table-responsive">

        <table class="table table-bordered">

          <thead>

            <tr>
              <th>Photo</th>
              <th>Nama</th>
              <th>Title</th>
              <th>Action</th>
            </tr>

          </thead>

          <tbody id="teacherTable"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script src="../assets/js/api.js"></script>

<script src="../assets/js/auth.js"></script>

<script src="../assets/js/layout.js"></script>

<script src="../assets/js/teachers.js"></script>

<script>

  checkAuth();

  initLayout('Staff Pengajar');

</script>

</body>
</html>
